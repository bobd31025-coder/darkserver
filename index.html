<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>رابط تحميل محاكي الشاص</title>
    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial, sans-serif;
            padding-top: 50px;
        }
        button {
            display: block;
            margin: 20px auto;
            font-size: 16pt;
            padding: 10px 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>تحميل محاكي الشاص مجاناً بدون تكاليف اضغط هنا</h1>
    <button onclick="تنبيه()">اضغط للتحميل</button>
    
    <img src="IMG_2392.jpg" alt="صورة المعاينة" style="max-width:100%; height:auto;">
    <h2 id="countdown"></h2>

    <script>
    var timeLeft = 10; // سنبدأ العد من الرقم 10
    var timerElement = document.getElementById("countdown");
    var interval;

    function تنبيه() {
        if (!interval) { // منع تكرار العداد إذا ضغط الزر أكثر من مرة
            interval = setInterval(function() {
                if (timeLeft <= 0) {
                    clearInterval(interval);
                    timerElement.innerHTML = "💥 تم تفجير السيرفر بنجاح! 💥";
                    alert("بمب! راحت عليك ملفاتك 😂");
                } else {
                    timerElement.innerHTML = "⚠️ سوف يتم التحميل بعد " + timeLeft + " ثواني...";
                }
                timeLeft -= 1; // إنقاص الوقت بمقدار 1 في كل ثانية
            }, 1000);
        }
    }
    </script>

    <script data-goatcounter="https://darkserver.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

</body>
</html>
